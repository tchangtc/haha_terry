name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-ruff@v5
        with:
          version: '>=0.5'
      - run: ruff check terry/ tests/

  type-check:
    name: Type Check (MyPy)
    runs-on: ubuntu-latest
    continue-on-error: true  # Not a hard failure yet
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install . mypy types-pyyaml types-requests
      - run: mypy terry/ --ignore-missing-imports || true

  test:
    name: Test (Pytest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install ".[dev]"
      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short --timeout=30

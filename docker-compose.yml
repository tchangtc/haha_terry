version: "3.8"

services:
  terry:
    build: .
    image: terry:latest
    container_name: terry-agent
    stdin_open: true    # Keep stdin open for REPL
    tty: true           # Allocate pseudo-TTY
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY:-}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - TERRY_LANGUAGE=${TERRY_LANGUAGE:-en}
    volumes:
      - .:/app                          # Project source
      - terry_data:/home/terry/.terry   # Persistent state
      - ~/.gitconfig:/home/terry/.gitconfig:ro  # Git identity
    working_dir: /app
    restart: "no"

  # Optional: run with Ollama for fully local operation
  ollama:
    image: ollama/ollama:latest
    container_name: terry-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - local

volumes:
  terry_data:
  ollama_data:
